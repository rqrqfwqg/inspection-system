version: "3.8"

services:
  inspection-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inspection-system
    restart: unless-stopped
    ports:
      - "9527:9527"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - ADMIN_INIT_PASSWORD=${ADMIN_INIT_PASSWORD:-ChangeMe123!}
      - DEV_MODE=false
      - PORT=9527
    volumes:
      - ./data:/app/backend/uploads
      - ./data/app.db:/app/backend/app.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9527/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
