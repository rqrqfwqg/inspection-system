<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试添加用户</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #3b82f6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #2563eb;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 4px;
            white-space: pre-wrap;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
        }
        .success {
            background: #d1fae5;
            color: #059669;
        }
    </style>
</head>
<body>
    <h1>测试添加用户功能</h1>
    
    <form id="userForm">
        <div class="form-group">
            <label>姓名 *</label>
            <input type="text" id="name" required>
        </div>
        
        <div class="form-group">
            <label>邮箱 *</label>
            <input type="email" id="email" required>
        </div>
        
        <div class="form-group">
            <label>密码 *</label>
            <input type="password" id="password" required minlength="6">
        </div>
        
        <div class="form-group">
            <label>部门</label>
            <input type="text" id="department">
        </div>
        
        <div class="form-group">
            <label>职位</label>
            <input type="text" id="position">
        </div>
        
        <div class="form-group">
            <label>电话</label>
            <input type="tel" id="phone">
        </div>
        
        <button type="submit">添加用户</button>
    </form>
    
    <div id="result" class="result" style="display:none;"></div>
    
    <script>
        const API_URL = 'http://127.0.0.1:5000/api';
        
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.textContent = '处理中...';
            
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                department: document.getElementById('department').value || undefined,
                position: document.getElementById('position').value || undefined,
                phone: document.getElementById('phone').value || undefined
            };
            
            console.log('发送数据:', userData);
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                console.log('响应:', data);
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '添加成功！\n\n' + JSON.stringify(data, null, 2);
                    document.getElementById('userForm').reset();
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '添加失败：' + (data.detail || JSON.stringify(data));
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '请求错误：' + error.message;
                console.error('错误:', error);
            }
        });
    </script>
</body>
</html>
