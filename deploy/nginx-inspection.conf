# ============================================================
# inspection-system · Nginx 反向代理配置（HTTPS 443 → 后端 9527）
# ------------------------------------------------------------
# 用途：用户访问 https://82.156.62.59 时，由 nginx 终止 TLS，
#       静态资源直接服务，/api 与 /uploads 转发到后端 uvicorn(9527)。
#
# 部署步骤：
#   1) 安装证书：把你的证书放到 /etc/nginx/ssl/inspection.crt + .key
#      （无域名可用 IP 自签： sudo openssl req -x509 -nodes -days 365 \
#         -newkey rsa:2048 -keyout /etc/nginx/ssl/inspection.key \
#         -out /etc/nginx/ssl/inspection.crt -subj "/CN=82.156.62.59" ）
#   2) 把本文件放到 /etc/nginx/sites-enabled/inspection.conf
#      （注意把下面 /home/<用户> 换成你服务器真实家目录）
#   3) sudo nginx -t && sudo systemctl reload nginx
#
# 安全组需放通：TCP 443（对外）+ 22（SSH）
# 后端 9527 只监听 127.0.0.1 即可，不必对外暴露。
# ============================================================

server {
    listen 443 ssl;
    server_name 82.156.62.59;

    ssl_certificate     /etc/nginx/ssl/inspection.crt;
    ssl_certificate_key /etc/nginx/ssl/inspection.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 50m;

    # ---- 前端静态资源（nginx 直接服务，更快）----
    location /assets/ {
        alias /home/<用户>/inspection-system/dist/assets/;
        expires 7d;
        try_files $uri =404;
    }
    location = /vite.svg {
        alias /home/<用户>/inspection-system/dist/vite.svg;
    }

    # ---- API 反代到后端 uvicorn ----
    location /api/ {
        proxy_pass http://127.0.0.1:9527;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- 上传文件反代 ----
    location /uploads/ {
        proxy_pass http://127.0.0.1:9527;
        proxy_set_header Host $host;
    }

    # ---- SPA fallback ----
    location / {
        root  /home/<用户>/inspection-system/dist;
        try_files $uri $uri/ /index.html;
    }
}

# HTTP 80 强制跳转 HTTPS（可选）
server {
    listen 80;
    server_name 82.156.62.59;
    return 301 https://$host$request_uri;
}
