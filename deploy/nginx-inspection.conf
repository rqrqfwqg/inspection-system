# ============================================================
# inspection-system · Nginx 反向代理配置（HTTPS 443 → 后端 9527）
# ------------------------------------------------------------
# 命名空间隔离：运维系统整体挂在 /ops 前缀下，与同机物料管理系统
# （由物料系统自身 conf 提供 / 与 /api/）物理隔离，避免 /api/auth/login
# 被错误转发到运维 9527。
#
# 部署步骤：
#   1) 安装证书：把你的证书放到 /etc/nginx/ssl/inspection.crt + .key
#      （无域名可用 IP 自签： sudo openssl req -x509 -nodes -days 365 \
#         -newkey rsa:2048 -keyout /etc/nginx/ssl/inspection.key \
#         -out /etc/nginx/ssl/inspection.crt -subj "/CN=82.156.62.59" ）
#   2) 把本文件放到 /etc/nginx/sites-enabled/inspection.conf
#      （注意把下面 /home/<用户> 换成你服务器真实家目录）
#   3) sudo nginx -t && sudo systemctl reload nginx
#
# 安全组需放通：TCP 443（对外）+ 22（SSH）
# 后端 9527 只监听 127.0.0.1 即可，不必对外暴露。
# ============================================================

server {
    listen 443 ssl;
    server_name 82.156.62.59;

    ssl_certificate     /etc/nginx/ssl/inspection.crt;
    ssl_certificate_key /etc/nginx/ssl/inspection.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 50m;

    # ===== 运维系统命名空间 /ops/ → 后端 uvicorn(9527)（透传完整路径，无 URI 改写）=====
    location = /ops { return 301 /ops/; }
    location /ops/ {
        proxy_pass http://127.0.0.1:9527;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ===== 运维上传命名空间 /ops/uploads/ → 后端（头像/交接班图片等，避免与物料系统 /uploads/ 冲突）=====
    location /ops/uploads/ {
        proxy_pass http://127.0.0.1:9527;
        proxy_set_header Host $host;
    }

    # ===== 物料系统的 / 与 /api/ 由物料系统自身 conf 提供，本文件不再声明，避免重复 location 冲突 =====
    # location /api/  { proxy_pass http://127.0.0.1:<MATERIAL_PORT>; }
    # location /      { root <MATERIAL_DIST>; try_files $uri $uri/ /index.html; }
}

# HTTP 80 强制跳转 HTTPS（可选）
server {
    listen 80;
    server_name 82.156.62.59;
    return 301 https://$host$request_uri;
}
